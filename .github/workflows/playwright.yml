name: Playwright Regression Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'   # daily at 6 AM UTC
  workflow_dispatch:
  repository_dispatch:
    types: [app-deployed]  # fired by badminton-tournament on every push to main

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    name: Tests — ${{ matrix.browser }}
    steps:
      - uses: actions/checkout@v4

      - name: Show trigger context
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "Source commit: ${{ github.event.client_payload.commit_sha }}"
          echo "Source message: ${{ github.event.client_payload.commit_message }}"
          echo "Triggered by user: ${{ github.event.client_payload.triggered_by }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright tests
        run: npx playwright test --project=${{ matrix.browser }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  mobile-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    name: Tests — Mobile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run mobile tests
        run: npx playwright test --project=mobile-chrome --project=mobile-safari

      - name: Upload mobile results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-mobile
          path: |
            playwright-report/
            test-results/
          retention-days: 30
